[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [".venv", "venv", "__pycache__", "migrations/versions"]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle
  "W",    # pycodestyle warnings
  "F",    # pyflakes — imports et variables morts
  "I",    # isort — ordre des imports
  "UP",   # pyupgrade — syntaxe périmée
  "B",    # flake8-bugbear — pièges réels (mutable default, boucle qui capture…)
  "C4",   # comprehensions inutilement verbeuses
  "SIM",  # simplifications lisibles
  "RUF",  # règles propres à ruff
]
ignore = [
  "E501",    # la longueur de ligne est portée par le formateur
  "B008",    # `Depends()` en valeur par défaut est le pattern FastAPI
  "RUF001",  # les chaînes FR contiennent des caractères typographiques (« », —)
  "RUF002",
  "RUF003",
  # Reste à traiter : ces règles remontent du vrai, mais chaque famille demande une
  # relecture métier plutôt qu'un fix mécanique. À réactiver une famille à la fois.
  "B904",    # 22 × `raise ... from err` manquant dans un `except`
  "UP042",   # 16 × `class X(str, Enum)` → `StrEnum`
  "SIM105",  # 8 × `try/except/pass` → `contextlib.suppress`
  "RUF006",  # 7 × `asyncio.create_task` dont la référence n'est pas conservée
  "F841",    # 6 × variable assignée jamais lue
  "B905",    # 5 × `zip()` sans `strict=`
  "B007",    # 2 × variable de boucle inutilisée
  "SIM102",  # 2 × `if` imbriqués fusionnables
  "SIM117",  # 1 × `with` imbriqués fusionnables
]

[tool.ruff.lint.per-file-ignores]
# Ces fichiers doivent exécuter du code AVANT leurs imports : ajout de la racine au
# sys.path, boucle d'événements Windows, configuration du logging SQLAlchemy.
"seeders/*.py" = ["E402"]
"scripts/*.py" = ["E402"]
"migrations/*.py" = ["E402", "W291", "W293"]   # + espaces dans les chaînes SQL
"main.py" = ["E402"]
"core/database.py" = ["E402"]
"models/__init__.py" = ["F401"]   # baril de ré-exports : les imports SONT l'API du package

[tool.ruff.format]
quote-style = "double"
