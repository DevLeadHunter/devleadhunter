name: 🚀 Build and Deploy Nuxt.js 4 Web to OVH VPS
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            web

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm ci
        working-directory: ./web

      - name: 📝 Setup environment file
        run: |
          cd web
          cp .env.example .env || touch .env
          sed -i "s/^NODE_ENV=.*/NODE_ENV=production/" .env || echo "NODE_ENV=production" >> .env

      - name: 🛠️ Build Nitro (SSR)
        run: npm run build
        working-directory: ./web
        env:
          NITRO_PRESET: node-server
          NODE_ENV: production
          # Public runtime config is baked here → the marketing-site PostHog key must
          # live on the build step (same pattern as deploy-demo-host.yml). Empty secret
          # → tracking stays disabled (no-op). Never put it in web/.env (see .env.example).
          NUXT_PUBLIC_POSTHOG_PROJECT_API_KEY: ${{ secrets.NUXT_PUBLIC_POSTHOG_PROJECT_API_KEY }}
          NUXT_PUBLIC_POSTHOG_INGESTION_HOST: ${{ secrets.NUXT_PUBLIC_POSTHOG_INGESTION_HOST }}

      - name: 🧹 Prepare server directory on VPS
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf /var/www/devleadhunter.dibodev.fr/server
            mkdir -p /var/www/devleadhunter.dibodev.fr/server

      - name: 📤 Deploy web assets
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'web/.output/public/'
          target: '/var/www/devleadhunter.dibodev.fr/html'
          strip_components: 3

      - name: 📤 Deploy Nitro server
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'web/.output/server/'
          target: '/var/www/devleadhunter.dibodev.fr/server'
          strip_components: 3
          tar_dereference: true
          overwrite: true

      - name: 📤 Deploy .env to server
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'web/.env'
          target: '/var/www/devleadhunter.dibodev.fr/server'

      - name: 🛠️ Start Nitro server
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/devleadhunter.dibodev.fr/server

            command -v node || {
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            }

            command -v pm2 || npm install -g pm2

            pm2 describe devleadhunter.dibodev.fr > /dev/null 2>&1 && pm2 delete devleadhunter.dibodev.fr || true

            PORT=5615 pm2 start index.mjs \
              --name devleadhunter.dibodev.fr \
              --env production

            pm2 save
            pm2 list

            # Nitro node-server serves static files from ../public (sibling of server/).
            # Assets are deployed to html/ for nginx; symlink so Node can serve them too
            # when nginx proxies the request (e.g. /favicon.ico).
            ln -sfn /var/www/devleadhunter.dibodev.fr/html /var/www/devleadhunter.dibodev.fr/public

            sudo nginx -t && sudo systemctl reload nginx
